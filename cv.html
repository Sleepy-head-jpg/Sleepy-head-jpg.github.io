<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CV | Sandeep Kumar</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐦</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Betania+Patmos&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --fd: 'Playfair Display', Georgia, serif;
      --fb: 'Source Serif 4', Georgia, serif;
      --fm: 'DM Mono', monospace;
      --rose:    #e6dada;
      --teal:    #274046;
      --bg:      #141c1e;
      --surface: #1c2729;
      --text:    #d8d0cc;
      --dim:     #7a8c8e;
      --gold:    #c4922a;
      --nav: 60px;
      --max: 1100px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--fb); font-weight: 300;
      line-height: 1.75; overflow-x: hidden;
      height: 100vh; display: flex; flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      height: var(--nav);
      background: rgba(20,28,30,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(230,218,218,0.08);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem;
      flex-shrink: 0;
    }
    .nav-name { font-family: var(--fd); font-size: 1rem; color: var(--rose); letter-spacing: 0.02em; }
    .nav-links { list-style: none; display: flex; gap: 1.8rem; }
    .nav-links a {
      font-family: var(--fm); font-size: 0.72rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--dim);
      border-bottom: 1px solid transparent; padding-bottom: 2px;
      transition: color .2s, border-color .2s;
    }
    .nav-links a:hover { color: var(--rose); }
    .nav-links a.active { color: var(--rose); border-bottom-color: var(--rose); }
    .hamburger { display: none; cursor: pointer; font-size: 1.3rem; color: var(--dim); }

    /* ── CV BAR (slim bar above PDF) ── */
    .cv-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.9rem 2.5rem;
      border-bottom: 1px solid rgba(230,218,218,0.08);
      background: var(--surface);
      flex-shrink: 0;
    }
    .cv-bar-title {
      font-family: var(--fd); font-size: 1rem;
      color: var(--rose); font-style: italic;
    }
    .cv-bar-right { display: flex; align-items: center; gap: 1.5rem; }
    .cv-updated {
      font-family: var(--fm); font-size: 0.68rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--dim);
    }
    .btn-dl {
      font-family: var(--fm); font-size: 0.7rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--rose);
      border: 1px solid rgba(230,218,218,0.25);
      padding: 0.35rem 0.9rem;
      transition: all .2s;
    }
    .btn-dl:hover { background: var(--rose); color: var(--teal); }

    /* ── PDF FRAME — fills remaining height ── */
    .pdf-frame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
      background: var(--bg);
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .nav-links { display: none; position: absolute; top: var(--nav); left: 0; right: 0; background: rgba(20,28,30,0.98); flex-direction: column; padding: 1.5rem 2rem; gap: 1.2rem; border-bottom: 1px solid rgba(230,218,218,0.08); }
      .nav-links.open { display: flex; }
      .hamburger { display: block; }
      .cv-bar { padding: 0.75rem 1.5rem; flex-wrap: wrap; gap: 0.75rem; }
    }
  </style>
</head>
<body>

  <nav id="navbar">
    <span class="nav-name">Sandeep Kumar</span>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="project.html">Projects</a></li>
      <li><a href="publications.html">Publications</a></li>
      <li><a href="anecdotes.html">Anecdotes</a></li>
      <li><a href="lens.html">Creative</a></li>
      <li><a href="cv.html" class="active">CV</a></li>
    </ul>
    <span class="hamburger" id="ham">☰</span>
  </nav>

  <!-- slim bar: title + updated date + download -->
  <div class="cv-bar">
    <span class="cv-bar-title">Curriculum Vitae — Sandeep Kumar</span>
    <div class="cv-bar-right">
      <span class="cv-updated">Last updated: May 2025</span>
      <a href="https://drive.google.com/uc?export=download&id=1u0bJ4ztAMtoRDEp6xbSfSKDs___6z-tJ" class="btn-dl">↓ Download</a>
    </div>
  </div>

  <!-- PDF embed via Google Drive -->
  <iframe
    class="pdf-frame"
    src="https://drive.google.com/file/d/1u0bJ4ztAMtoRDEp6xbSfSKDs___6z-tJ/preview"
    allow="autoplay"
    allowfullscreen
  ></iframe>

  <script>
    const ham = document.getElementById('ham');
    const nl  = document.getElementById('navLinks');
    ham.addEventListener('click', () => {
      nl.classList.toggle('open');
      ham.textContent = nl.classList.contains('open') ? '✕' : '☰';
    });
  </script>
</body>
</html>
